<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 뉴스 수집기</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
    
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: #0f172a; /* slate-900 */
            color: #f8fafc; /* slate-50 */
        }
        
        /* Custom scrollbar for modern feel */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-bottom-color: #3b82f6;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#8b5cf6',
                    },
                    keyframes: {
                        'fade-in-up': {
                            '0%': { opacity: '0', transform: 'translateY(15px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                    animation: {
                        'fade-in-up': 'fade-in-up 0.5s ease-out forwards',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen relative overflow-x-hidden selection:bg-blue-500/30 selection:text-white">
    
    <!-- Background Animated Gradients -->
    <div class="fixed top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-blue-600/10 blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-purple-600/10 blur-[120px] pointer-events-none"></div>

    <div class="max-w-4xl mx-auto px-5 py-16 relative z-10">
        
        <!-- Header -->
        <header class="text-center mb-14 animate-fade-in-up">
            <div class="inline-flex items-center gap-2 px-3 py-1 mb-6 rounded-full glass-panel text-sm text-blue-300 border-blue-500/20">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                </span>
                LIVE NEWS COLLECTOR
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold mb-5 tracking-tight">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400">
                    실시간 뉴스 수집기
                </span>
            </h1>
            <p class="text-slate-400 text-lg md:text-xl font-light leading-relaxed">
                어제 18:00 (KST) 이후의 따끈따끈한 최신 뉴스만 모아보세요.<br>
                <span class="text-sm md:text-base opacity-80 mt-2 block">검색창에 원하시는 키워드(예: 남양주, AI, 구글 등)를 입력하고 '검색하기' 버튼을 눌러보세요.<br>백엔드 서버 없이도 실시간으로 구글 뉴스를 가져오고 '어제 18:00' 이후 조건에 맞게 필터링되는 것을 확인하실 수 있습니다.</span>
            </p>
        </header>

        <main>
            <!-- Search Form Area -->
            <div class="glass-panel p-6 md:p-8 rounded-3xl shadow-2xl mb-10 animate-fade-in-up" style="animation-delay: 100ms;">
                <form id="searchForm" class="flex flex-col md:flex-row gap-5">
                    <div class="flex-1">
                        <label for="keyword" class="block text-sm font-medium text-slate-400 mb-2 pl-1">검색 키워드</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                            </div>
                            <input type="text" id="keyword" required placeholder="예: IT, AI, 경제, 혹은 지역 이름..." 
                                class="w-full bg-slate-900/50 border border-slate-700/80 rounded-2xl pl-12 pr-4 py-4 text-white font-medium focus:outline-none focus:border-blue-500/80 focus:ring-1 focus:ring-blue-500/80 transition-all placeholder-slate-600">
                        </div>
                    </div>
                    <div class="w-full md:w-36">
                        <label for="limit" class="block text-sm font-medium text-slate-400 mb-2 pl-1">기사 수 (최대)</label>
                        <input type="number" id="limit" value="7" min="1" max="50"
                            class="w-full bg-slate-900/50 border border-slate-700/80 rounded-2xl px-4 py-4 text-white font-medium focus:outline-none focus:border-blue-500/80 focus:ring-1 focus:ring-blue-500/80 transition-all text-center">
                    </div>
                    <div class="flex items-end">
                        <button type="submit" 
                            class="w-full md:w-auto h-[58px] bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold py-3 px-8 rounded-2xl transition-all transform hover:-translate-y-1 hover:shadow-[0_10px_20px_rgba(59,130,246,0.2)] shadow-lg flex justify-center items-center group">
                            검색하기
                            <svg class="w-5 h-5 ml-2 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Loading State -->
            <div id="loading" class="hidden flex-col items-center justify-center py-20">
                <div class="loader w-14 h-14 mb-6"></div>
                <p class="text-slate-400 font-medium animate-pulse tracking-wide">뉴스를 수집하고 있습니다...</p>
            </div>

            <!-- Error State -->
            <div id="error" class="hidden bg-red-500/10 border border-red-500/30 text-red-300 px-6 py-5 rounded-2xl mb-8 flex items-center gap-3">
                <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <div id="errorText" class="flex-1"></div>
            </div>

            <!-- Results Section -->
            <div id="resultsInfo" class="hidden animate-fade-in-up" style="animation-delay: 100ms;">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 pl-2">
                    <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-100 to-slate-400">
                        검색 결과 <span id="resultCount" class="text-blue-400">0</span>건
                    </h2>
                    <span class="text-sm text-slate-500 font-medium px-3 py-1 bg-slate-800/50 rounded-lg mt-2 sm:mt-0">
                        필터 기준: 어제 18:00 (KST) ~ 현재
                    </span>
                </div>
                
                <div id="newsContainer" class="grid grid-cols-1 gap-5">
                    <!-- News cards will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Application Logic -->
    <script>
        const searchForm = document.getElementById('searchForm');
        const keywordInput = document.getElementById('keyword');
        const limitInput = document.getElementById('limit');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const errorText = document.getElementById('errorText');
        const newsContainer = document.getElementById('newsContainer');
        const resultsInfo = document.getElementById('resultsInfo');
        const resultCountEl = document.getElementById('resultCount');

        /**
         * Converts date to relative time string (e.g. "2시간 전")
         */
        function getRelativeTime(date) {
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (minutes < 60) return `${Math.max(0, minutes)}분 전`;
            if (hours < 24) return `${hours}시간 전`;
            return `${days}일 전`;
        }

        /**
         * Calculates the strict global UTC timestamp representing exactly "Yesterday 18:00 KST"
         * KST = UTC + 9.
         */
        function getYesterday1800KSTTimestamp() {
            // Get current time in pure UTC representation
            const nowUtcMs = Date.now();
            
            // Offset to get pseudo-KST time explicitly
            const kstOffsetMs = 9 * 60 * 60 * 1000; 
            const kstMs = nowUtcMs + kstOffsetMs;
            
            // Treat the KST time as UTC to safely use Date UTC methods to modify days
            const kstDate = new Date(kstMs);
            
            // Define "Yesterday 18:00" under the assumption that kstDate parts are KST local time parts
            const targetPseudoUtcMs = Date.UTC(
                kstDate.getUTCFullYear(), 
                kstDate.getUTCMonth(), 
                kstDate.getUTCDate() - 1,  // Yesterday
                18, // 18:00
                0, 
                0, 
                0
            );
            
            // Finally transform this target pseudo-UTC time back to true global UTC timestamp
            return targetPseudoUtcMs - kstOffsetMs;
        }

        /**
         * Cleans up the title by removing the publisher suffix often appended by Google News
         */
        function cleanTitle(title) {
            const lastDashIndex = title.lastIndexOf(' - ');
            if (lastDashIndex !== -1) {
                return title.substring(0, lastDashIndex);
            }
            return title;
        }

        /**
         * Fetch and process news
         */
        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const keyword = keywordInput.value.trim();
            const limit = parseInt(limitInput.value) || 7;

            if (!keyword) return;

            // Reset States
            errorEl.classList.add('hidden');
            resultsInfo.classList.add('hidden');
            newsContainer.innerHTML = '';
            loadingEl.classList.remove('hidden');
            loadingEl.classList.add('flex');

            try {
                // To bypass CORS for client-side API calls, we use allorigins win proxy.
                // This lets Netlify host this pure static file without backend functions.
                const googleNewsRssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(keyword)}&hl=ko&gl=KR&ceid=KR:ko`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(googleNewsRssUrl)}`;
                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('네트워크 응답 오류가 발생했습니다.');
                
                const data = await response.json();
                
                // Parse XML content
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                
                const parseError = xmlDoc.querySelector('parsererror');
                if (parseError) throw new Error('데이터 파싱에 실패했습니다.');

                const items = Array.from(xmlDoc.querySelectorAll('item'));
                const targetTimestamp = getYesterday1800KSTTimestamp();
                
                // 1. Map to object
                // 2. Filter by time
                let filteredArticles = items.map(item => {
                    const title = item.querySelector('title')?.textContent || '제목 없음';
                    const link = item.querySelector('link')?.textContent || '#';
                    const pubDateStr = item.querySelector('pubDate')?.textContent || '';
                    const source = item.querySelector('source')?.textContent || '구글 뉴스';
                    
                    const pubDate = new Date(pubDateStr);
                    return {
                        title: cleanTitle(title),
                        link,
                        pubDate,
                        timestamp: pubDate.getTime(),
                        source
                    };
                }).filter(article => article.timestamp >= targetTimestamp);

                // 3. Sort by Newest
                filteredArticles.sort((a, b) => b.timestamp - a.timestamp);

                // 4. Apply User Limit
                filteredArticles = filteredArticles.slice(0, limit);

                // Render Results
                loadingEl.classList.add('hidden');
                loadingEl.classList.remove('flex');
                
                if (filteredArticles.length === 0) {
                    errorText.textContent = `'${keyword}' 에 대한 어제 18:00 이후의 최신 기사가 없습니다.`;
                    errorEl.classList.remove('hidden');
                    return;
                }

                resultCountEl.textContent = filteredArticles.length;
                resultsInfo.classList.remove('hidden');

                // Generate Cards
                filteredArticles.forEach((article, index) => {
                    // Date Formatter (Korean Locale)
                    const formattedDate = new Intl.DateTimeFormat('ko-KR', {
                        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false
                    }).format(article.pubDate);

                    const card = document.createElement('a');
                    card.href = article.link;
                    card.target = "_blank";
                    card.rel = "noopener noreferrer";
                    
                    // Delay animation cascading effect
                    const delay = index * 100;
                    
                    card.className = "block glass-panel p-6 rounded-2xl hover:bg-slate-800/80 transition-all duration-300 border border-slate-700/50 hover:border-blue-500/50 group animate-fade-in-up relative overflow-hidden";
                    card.style.animationDelay = `${delay}ms`;

                    card.innerHTML = `
                        <div class="absolute top-0 left-0 w-1 h-full bg-blue-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div class="flex-1 pr-4">
                                <h3 class="text-xl font-semibold text-slate-100 group-hover:text-blue-400 transition-colors mb-3 leading-snug">
                                    ${article.title}
                                </h3>
                                <div class="flex flex-wrap items-center gap-3 text-sm text-slate-400">
                                    <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-slate-900/80 text-blue-300 border border-blue-900/50 uppercase tracking-wide">
                                        ${article.source}
                                    </span>
                                    <span class="flex items-center gap-1.5 opacity-80">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        ${formattedDate} 
                                        <span class="text-slate-500 ml-1">(${getRelativeTime(article.pubDate)})</span>
                                    </span>
                                </div>
                            </div>
                            <div class="hidden sm:flex self-center w-10 h-10 rounded-full bg-slate-800 items-center justify-center text-slate-400 group-hover:bg-blue-600 group-hover:text-white transition-all transform group-hover:scale-110 shadow-lg">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </div>
                        </div>
                    `;
                    
                    newsContainer.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                loadingEl.classList.add('hidden');
                loadingEl.classList.remove('flex');
                errorText.textContent = `오류가 발생했습니다: ${err.message}`;
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
